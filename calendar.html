    <!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Educa-Connect • Calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="calendar">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebarTop">
        <div class="brand mini">
          <div class="logo">EC</div>
          <div>
            <div class="title">Educa-Connect</div>
            <div class="muted tiny" id="whoami"></div>
          </div>
        </div>
      </div>

      <nav class="nav">
        <a class="navItem" href="dashboard.html">🏠 Dashboard</a>
        <a class="navItem" href="chat.html">💬 Chat</a>
        <a class="navItem active" href="calendar.html">📅 Calendar</a>
        <a class="navItem" href="profile.html">👤 Profile</a>
        <a class="navItem" href="admin.html" id="adminLink" hidden>🛠️ Admin</a>
        <button class="navItem danger" id="btnLogout">⎋ Logout</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2>Calendar</h2>
          <p class="muted">Book your meetings and follow your events</p>
        </div>
      </header>

      <section class="panel">
        <div class="panelHeader">
          <h3>Book a meeting</h3>
          <p class="muted tiny">All participants have access to the meeting.</p>
        </div>

        <form id="eventForm" class="formGrid">
          <div class="field">
            <label>Date</label>
            <input id="eDate" type="date" />
          </div>
          <div class="field">
            <label>Time</label>
            <input id="eTime" type="time" />
          </div>
          <div class="field full">
            <label>Description</label>
            <input id="eDesc" type="text" placeholder="e.g. Clinical internship follow-up meeting." />
          </div>
          <div class="field full">
            <label>Participants</label>
            <div id="participants" class="chips"></div>
            <div class="muted tiny">Select 1+ person (student/prof/supervisor/admin).</div>
          </div>

          <div class="row">
            <button class="btn primary" type="submit">Submit event</button>
          </div>

          <div class="alert ok" id="eOk" hidden></div>
          <div class="alert error" id="eErr" hidden></div>
        </form>
      </section>

      <section class="panel">
        <div class="panelHeader">
          <h3>Upcoming events</h3>
        </div>
        <div id="eventList" class="list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
