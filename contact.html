    <!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Educa-Connect • Contact Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="contact">
  <div class="shell">
    <div class="card">
      <div class="brand">
        <div class="logo">EC</div>
        <div>
          <h1>Contact the Administrator</h1>
          <p class="muted">If you don´t have an account, please send an access request.</p>
        </div>
      </div>

      <form id="contactForm" class="formGrid">
        <div class="field">
          <label>Name</label>
          <input id="cName" type="text" placeholder="Your name" />
        </div>
        <div class="field">
          <label>Email</label>
          <input id="cEmail" type="email" placeholder="Your email" />
        </div>
        <div class="field">
          <label>Select your role</label>
          <select id="cRole">
            <option value="student">Student</option>
            <option value="teacher">Professor</option>
            <option value="supervisor">Supervisor</option>
          </select>
        </div>
        <div class="field full">
          <label>Message</label>
          <textarea id="cMsg" rows="5" placeholder="Send your request (e.g. academic year, hospital, internship area, etc.)"></textarea>
        </div>

        <div class="row">
          <button class="btn primary" type="submit">Submit</button>
          <a class="btn ghost" href="index.html">Turn to login</a>
        </div>

        <div class="alert ok" id="cOk" hidden></div>
        <div class="alert error" id="cErr" hidden></div>
      </form>
    </div>

    <footer class="foot muted">
      <span>The admin will see the request in the panel “Admin”.</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
