    <!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Educa-Connect • Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="dashboard">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebarTop">
        <div class="brand mini">
          <div class="logo">EC</div>
          <div>
            <div class="title">Educa-Connect</div>
            <div class="muted tiny" id="whoami"></div>
          </div>
        </div>
      </div>

      <nav class="nav">
        <a class="navItem active" href="dashboard.html">🏠 Dashboard</a>
        <a class="navItem" href="chat.html">💬 Chat</a>
        <a class="navItem" href="calendar.html">📅 Calendar</a>
        <a class="navItem" href="profile.html">👤 Profile</a>
        <a class="navItem" href="admin.html" id="adminLink" hidden>🛠️ Admin</a>
        <button class="navItem danger" id="btnLogout">⎋ Logout</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="greeting">Dashboard</h2>
          <p class="muted" id="subtitle"></p>
        </div>
        <div class="pill" id="rolePill"></div>
      </header>

      <section class="cards">
        <div class="infoCard">
          <h3>Shortcuts</h3>
          <div class="row wrap">
            <a class="btn ghost" href="chat.html">Open chat</a>
            <a class="btn ghost" href="calendar.html">See calendar</a>
            <a class="btn ghost" href="profile.html">Profile edition</a>
          </div>
        </div>

        <div class="infoCard">
          <h3>Upcoming meetings</h3>
          <div id="nextMeetings" class="muted">Loading…</div>
        </div>

        <div class="infoCard">
          <h3>Feedbacks & Summary</h3>
          <div id="feedbackSummary" class="muted">Loading…</div>
        </div>
      </section>

      <section class="panel" id="feedbackPanel">
        <div class="panelHeader">
          <h3 id="fbTitle">Feedbacks</h3>
          <p class="muted tiny" id="fbHint"></p>
        </div>

        <!-- Form (teacher/supervisor) -->
        <form id="fbForm" class="formGrid" hidden>
          <div class="field">
            <label>Student</label>
            <select id="fbStudent"></select>
          </div>
          <div class="field">
            <label>Title</label>
            <input id="fbTitleInput" type="text" placeholder="e.g. Intercalar assessment" />
          </div>
          <div class="field">
            <label>Grade (optional)</label>
            <input id="fbGrade" type="text" placeholder="e.g. 16/20" />
          </div>
          <div class="field full">
            <label>Message</label>
            <textarea id="fbMessage" rows="4" placeholder="Feedback details..."></textarea>
          </div>
          <div class="row">
            <button class="btn primary" type="submit">Submit feedback</button>
          </div>
          <div class="alert ok" id="fbOk" hidden></div>
          <div class="alert error" id="fbErr" hidden></div>
        </form>

        <!-- List -->
        <div id="fbList" class="list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
